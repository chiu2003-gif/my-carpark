<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 智能即時搵車位 (Vibe Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { height: calc(100vh - 290px); width: 100%; z-index: 1; }
        @media (min-width: 768px) {
            #map { height: calc(100vh - 70px); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="w-full md:w-96 flex flex-col bg-slate-800 shadow-2xl z-10 border-b md:border-b-0 md:border-r border-slate-700">
        <div class="p-4 bg-slate-850 border-b border-slate-700">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-xl font-bold tracking-wider flex items-center gap-2 text-emerald-400">
                    <span>🚗</span> 附近即時車位
                </h1>
                <button onclick="refreshData()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-xs px-3 py-1.5 rounded-lg transition-all shadow-md">
                    🔄 刷新數據
                </button>
            </div>
            <p id="status-text" class="text-xs text-slate-400 flex items-center gap-1">
                ⏳ 正在初始化 GPS 定位...
            </p>
        </div>

        <div id="parking-list" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
            <div class="text-center py-8 text-slate-500">正在努力載入全港停車場數據...</div>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="map"></div>
        <button onclick="getUserLocation()" class="absolute bottom-6 right-6 bg-slate-800 text-white p-3 rounded-full shadow-2xl border border-slate-600 hover:bg-slate-700 transition-all" style="z-index: 999;" title="回到我身處的位置">
            📍
        </button>
    </div>

    <script>
        // 預設中心點 (如果用唔到 GPS，就去旺角)
        let userLat = 22.3193;
        let userLng = 114.1694;
        let map;
        let carparkMarkers = [];
        let carparkDataGlobal = [];
        let userMarker;

        // 初始化地圖
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userLat, userLng], 15);
            L.control.zoom({ position: 'topright' }).addTo(map);

            // 使用超好看、極簡乾淨的黑白/彩色地圖樣式 (CartoDB Voyager)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            
            getUserLocation();
        }

        // 獲取使用者 GPS 定位
        function getUserLocation() {
            updateStatus("🛰️ 正在精確定位你的位置...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        
                        map.setView([userLat, userLng], 16);
                        
                        // 標記用家目前的位置
                        if (userMarker) map.removeLayer(userMarker);
                        userMarker = L.marker([userLat, userLng], {
                            icon: L.divIcon({
                                html: '<div class="relative flex h-5 w-5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-5 w-5 bg-blue-600 border-2 border-white shadow-md"></span></div>',
                                className: '',
                                iconSize: [20, 20]
                            })
                        }).addTo(map).bindPopup("<b>你喺呢度 📍</b>").openPopup();

                        updateStatus("✅ 定位成功，正在對接政府 Data.gov.hk...");
                        fetchCarparkData();
                    },
                    (error) => {
                        console.error(error);
                        updateStatus("❌ 無法獲取 GPS 權限，已預設顯示【旺角】附近。");
                        fetchCarparkData();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                updateStatus("❌ 瀏覽器不支援 GPS，已預設顯示【旺角】附近。");
                fetchCarparkData();
            }
        }

        // 從政府 API 爬取數據 (合併 Info 同 Vacancy 數據)
        async function fetchCarparkData() {
            try {
                // 同步發出兩個 API 請求
                const [infoRes, vacancyRes] = await Promise.all([
                    fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW'),
                    fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW')
                ]);

                const infoData = await infoRes.json();
                const vacancyData = await vacancyRes.json();

                // 把 Vacancy 數據轉成 Map 方便極速配對
                const vacancyMap = {};
                if (vacancyData.results) {
                    vacancyData.results.forEach(v => {
                        const id = v.park_Id || v.park_id;
                        if (id) vacancyMap[id] = v;
                    });
                }

                // 合併數據，並計算與使用者的距離
                carparkDataGlobal = infoData.results.map(info => {
                    const id = info.park_Id || info.park_id;
                    const vInfo = vacancyMap[id];
                    
                    let vacancyNum = -1; // -1 代表未知 / 沒提供私家車數據
                    if (vInfo && vInfo.privateCar && vInfo.privateCar.length > 0) {
                        // 攞私家車位實時空置數
                        vacancyNum = vInfo.privateCar[0].vacancy !== undefined ? vInfo.privateCar[0].vacancy : -1;
                    }

                    const lat = parseFloat(info.latitude);
                    const lng = parseFloat(info.longitude);
                    const distance = getDistance(userLat, userLng, lat, lng);

                    return {
                        id: id,
                        name: info.name || '未知停車場',
                        address: info.displayAddress || '未提供地址',
                        lat: lat,
                        lng: lng,
                        vacancy: vacancyNum,
                        distance: distance
                    };
                }).filter(c => !isNaN(c.lat) && !isNaN(c.lng)); // 濾走無坐標嘅死數據

                // 按距離由近到遠排序
                carparkDataGlobal.sort((a, b) => a.distance - b.distance);

                updateStatus(`🚗 成功載入全港 ${carparkDataGlobal.length} 個停車場資料！`);
                renderApp();

            } catch (err) {
                console.error(err);
                updateStatus("💥 連線到 Data.gov.hk 失敗，請遲啲再試。");
                document.getElementById('parking-list').innerHTML = `<div class="text-center text-rose-400 py-4">數據加載錯誤。</div>`;
            }
        }

        // 渲染地圖圖針同清單
        function renderApp() {
            // 清空舊圖針
            carparkMarkers.forEach(m => map.removeLayer(m));
            carparkMarkers = [];

            const listContainer = document.getElementById('parking-list');
            listContainer.innerHTML = '';

            // 只挑選最接近的前 40 個顯示在清單內，避免畫面太爆
            const nearCarparks = carparkDataGlobal.slice(0, 40);

            nearCarparks.forEach((carpark, index) => {
                // 1. 決定顏色狀態
                let colorClass = 'bg-slate-650'; // 灰色 (無資料)
                let badgeText = '未知';
                let markerBg = 'bg-gray-500';

                if (carpark.vacancy > 20) {
                    colorClass = 'border-l-4 border-emerald-500 bg-slate-800 hover:bg-slate-700';
                    badgeText = `${carpark.vacancy} 位`;
                    markerBg = 'bg-emerald-500';
                } else if (carpark.vacancy > 0) {
                    colorClass = 'border-l-4 border-amber-500 bg-slate-800 hover:bg-slate-700';
                    badgeText = `${carpark.vacancy} 位`;
                    markerBg = 'bg-amber-500';
                } else if (carpark.vacancy === 0) {
                    colorClass = 'border-l-4 border-rose-500 bg-slate-800 opacity-75';
                    badgeText = '滿位';
                    markerBg = 'bg-rose-500';
                }

                // 2. 喺地圖上面落針 (用自訂 HTML 變色標籤)
                const displayNum = carpark.vacancy >= 0 ? carpark.vacancy : '無';
                const marker = L.marker([carpark.lat, carpark.lng], {
                    icon: L.divIcon({
                        html: `<div class="${markerBg} text-slate-900 font-extrabold text-[11px] px-1.5 py-0.5 rounded shadow-lg border border-white text-center min-w-[28px] truncate">${displayNum}</div>`,
                        className: '',
                        iconSize: [32, 22],
                        iconAnchor: [16, 11]
                    })
                }).addTo(map);

                // 圖針 Popup
                marker.bindPopup(`
                    <div class="text-slate-900 p-1">
                        <h3 class="font-bold text-sm">${carpark.name}</h3>
                        <p class="text-xs text-slate-600 my-1">${carpark.address}</p>
                        <div class="mt-2 text-xs font-bold text-white px-2 py-1 inline-block rounded ${markerBg}">
                            私家車剩餘：${badgeText}
                        </div>
                    </div>
                `);

                // 儲存 Marker 引用，方便撳清單時彈出
                carparkMarkers[carpark.id] = marker;

                // 3. 建立左側/下方清單 HTML
                const distText = carpark.distance < 1 
                    ? `${Math.round(carpark.distance * 1000)} 米` 
                    : `${carpark.distance.toFixed(1)} 公里`;

                const itemHtml = `
                    <div onclick="focusCarpark('${carpark.id}', ${carpark.lat}, ${carpark.lng})" class="p-3 rounded-lg cursor-pointer transition-all ${colorClass} shadow flex justify-between items-center">
                        <div class="flex-1 min-w-0 pr-2">
                            <h3 class="font-bold text-sm truncate text-slate-200">${carpark.name}</h3>
                            <p class="text-xs text-slate-400 truncate mt-0.5">${carpark.address}</p>
                            <span class="text-[11px] font-medium text-slate-500 bg-slate-900 px-1.5 py-0.5 rounded mt-1 inline-block">📍 距離你 ${distText}</span>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <span class="text-xs font-bold px-2.5 py-1.5 rounded-md ${markerBg} text-slate-950 block text-center min-w-[65px]">
                                ${badgeText}
                            </span>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        // 撳清單時，地圖全速移過去並開 Popup
        function focusCarpark(id, lat, lng) {
            map.setView([lat, lng], 17);
            if (carparkMarkers[id]) {
                carparkMarkers[id].openPopup();
            }
        }

        // 更新頂部文字狀態
        function updateStatus(text) {
            document.getElementById('status-text').innerHTML = text;
        }

        // 手動刷新按鈕
        function refreshData() {
            updateStatus("🔄 正在重新撈取最新實時車位數據...");
            fetchCarparkData();
        }

        // 實用數學公式：計算地球表面兩點距離 (Haversine Formula)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // 啟動！
        window.onload = initMap;
    </script>
</body>
</html>
