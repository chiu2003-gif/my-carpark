<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 智能即時搵車位 (高德導航版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { height: calc(100vh - 290px); width: 100%; z-index: 1; }
        @media (min-width: 768px) {
            #map { height: calc(100vh - 70px); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col md:flex-row h-screen overflow-hidden">

    <div class="w-full md:w-96 flex flex-col bg-slate-800 shadow-2xl z-10 border-b md:border-b-0 md:border-r border-slate-700">
        <div class="p-4 bg-slate-850 border-b border-slate-700">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-xl font-bold tracking-wider flex items-center gap-2 text-emerald-400">
                    <span>🚗</span> 附近即時車位
                </h1>
                <button onclick="refreshData()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold text-xs px-3 py-1.5 rounded-lg transition-all shadow-md">
                    🔄 刷新數據
                </button>
            </div>
            <p id="status-text" class="text-xs text-slate-400 flex items-center gap-1">
                ⏳ 正在初始化 GPS 定位...
            </p>
        </div>

        <div id="parking-list" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
            <div class="text-center py-8 text-slate-500">正在努力載入全港停車場數據...</div>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="map"></div>
        <button onclick="getUserLocation()" class="absolute bottom-6 right-6 bg-slate-800 text-white p-3 rounded-full shadow-2xl border border-slate-600 hover:bg-slate-700 transition-all" style="z-index: 999;" title="回到我身處的位置">
            📍
        </button>
    </div>

    <script>
        // 預設中心點 (如果用唔到 GPS，就去旺角)
        let userLat = 22.3193;
        let userLng = 114.1694;
        let map;
        let carparkMarkers = [];
        let carparkDataGlobal = [];
        let userMarker;

        // 初始化地圖
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userLat, userLng], 15);
            L.control.zoom({ position: 'topright' }).addTo(map);

            // 使用免 Key 乾淨地圖樣式 (CartoDB Voyager)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            
            getUserLocation();
        }

        // 獲取使用者 GPS 定位
        function getUserLocation() {
            updateStatus("🛰️ 正在精確定位你的位置...");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        
                        map.setView([userLat, userLng], 16);
                        
                        // 標記用家目前的位置
                        if (userMarker) map.removeLayer(userMarker);
                        userMarker = L.marker([userLat, userLng], {
                            icon: L.divIcon({
                                html: '<div class="relative flex h-5 w-5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-5 w-5 bg-blue-600 border-2 border-white shadow-md"></span></div>',
                                className: '',
                                iconSize: [20, 20]
                            })
                        }).addTo(map).bindPopup("<b>你喺呢度 📍</b>").openPopup();

                        updateStatus("✅ 定位成功，正在對接政府 Data.gov.hk...");
                        fetchCarparkData();
                    },
                    (error) => {
                        console.error(error);
                        updateStatus("❌ 無法獲取 GPS 權限，已預設顯示【旺角】附近。");
                        fetchCarparkData();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                updateStatus("❌ 瀏覽器不支援 GPS，已預設顯示【旺角】附近。");
                fetchCarparkData();
            }
        }
